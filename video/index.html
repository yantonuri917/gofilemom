    <script>
        const videoList = [
            "https://video.twimg.com/amplify_video/1829592544289669148/vid/avc1/640x360/ShZOEb6UxK4s62oY.mp4?tag=14",

            "https://video.twimg.com/amplify_video/1916966308471562240/vid/avc1/640x360/iRwNyrJg_nGx6Bet.mp4?tag=16",
            "https://video.twimg.com/amplify_video/2010344361880641536/vid/avc1/1280x720/YUzeg-dr6oZvxBtu.mp4?tag=21",
            "https://video.twimg.com/amplify_video/1984165749263626245/vid/avc1/1280x720/y0V3M3ncbNH4SG_0.mp4?tag=21",
            "https://video.twimg.com/amplify_video/2012062342675382273/vid/avc1/642x360/HSdZS9r3UP0y2-k4.mp4?tag=21",
            "https://video.twimg.com/amplify_video/2009881239487209472/vid/avc1/854x480/eGRqHsWJ8Zur88-E.mp4?tag=21",
            "https://video.twimg.com/amplify_video/2018863763563388928/vid/avc1/640x360/6L9zE9mol-Wotc5y.mp4?tag=21",
            "https://video.twimg.com/amplify_video/2018869451152908288/vid/avc1/1280x720/z0tdJi5fNBBPX1iq.mp4?tag=21",
            "https://video.twimg.com/amplify_video/2018869702848823296/vid/avc1/640x360/SddWBCSYD3QsHHOO.mp4?tag=21",
            "https://video.twimg.com/amplify_video/2020884792548696064/vid/avc1/854x480/yfu2xh6FhF9cJs0H.mp4?tag=21"
        ];

        const video = document.getElementById('mainPlayer');
        const videoSource = document.getElementById('videoSource');
        const mainTitle = document.getElementById('mainTitle');
        const relatedGrid = document.getElementById('relatedGrid');
        
        let needsReset = true;

        videoList.forEach((url, index) => {
            const card = document.createElement('div');
            card.className = 'video-card flex flex-col';
            card.innerHTML = `
                <div class="relative aspect-video bg-gray-900 rounded overflow-hidden">
                    <video class="w-full h-full object-cover pointer-events-none" muted preload="metadata">
                        <source src="${url}#t=5" type="video/mp4">
                    </video>
                    <span class="absolute bottom-1 right-1 bg-black/80 text-[10px] px-1 rounded font-bold">HD</span>
                </div>
                <div class="py-2">
                    <h3 class="text-xs font-bold line-clamp-2 leading-tight">Exclusive Video Clip #${index + 1}</h3>
                    <div class="text-[10px] text-gray-500 mt-1 flex justify-between">
                        <span><i class="fas fa-play mr-1"></i> ${Math.floor(Math.random() * 50) + 1}k</span>
                        <span class="text-yellow-500"><i class="fas fa-star mr-1"></i> ${Math.floor(Math.random() * 20) + 80}%</span>
                    </div>
                </div>
            `;
            
            card.onclick = () => {
                videoSource.src = url + "#t=5";
                mainTitle.innerText = `Exclusive Video Clip #${index + 1}`;
                needsReset = true;
                video.load();
                window.scrollTo({ top: 0, behavior: 'smooth' });
                video.play().catch(() => {});
            };
            
            relatedGrid.appendChild(card);
        });

        video.addEventListener('play', () => {
            if (needsReset) {
                video.currentTime = 0;
                needsReset = false;
            }
        });
    </script>
