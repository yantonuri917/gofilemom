<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gofile UI - Clean Minimalist</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #202938;
            color: #e2e8f0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding-top: 60px;
        }
        
        .ad-sticky-top {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 60px;
            background: #111827;
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            border-bottom: 1px solid #374151;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
        }

        .btn-blue { background-color: #2563eb; }
        
        .toolbar-container {
            background-color: #2d3748;
            border: 1px solid #4a5568;
        }

        .toolbar-icon {
            @apply flex items-center justify-center p-2 rounded text-gray-300 text-sm transition-colors;
            background-color: #3d495d;
        }
        .toolbar-icon:hover {
            background-color: #4a5568;
            color: white;
        }

        .video-container {
            width: 130px;
            aspect-ratio: 9 / 16;
            background: #000;
            border-radius: 10px;
            overflow: hidden;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            cursor: pointer;
            margin: 0 auto;
            border: 1px solid #4a5568;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        .video-container.expanded {
            width: 100%;
            max-width: 100%;
            aspect-ratio: 16 / 9;
            border-radius: 12px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border-color: #3b82f6;
        }

        @media (max-width: 640px) {
            .video-container.expanded {
                aspect-ratio: 9 / 16;
            }
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            pointer-events: none;
            opacity: 0.9;
            transition: opacity 0.3s;
        }

        .video-container.expanded iframe {
            pointer-events: auto;
            opacity: 1;
        }

        /* Overlay transparan tipis hanya untuk menangkap klik */
        .play-overlay {
            position: absolute;
            inset: 0;
            background: transparent;
            z-index: 5;
            transition: all 0.3s;
        }

        .video-container.expanded .play-overlay {
            display: none;
        }

        .video-card {
            background-color: #2d3748;
            border: 1px solid #374151;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .custom-checkbox {
            width: 18px;
            height: 18px;
            border: 1px solid #64748b;
            border-radius: 3px;
            background: #1f2937;
        }
    </style>
</head>

    <script>
        function expandAndPlay(containerId, iframeId, baseUrl) {
            const container = document.getElementById(containerId);
            const iframe = document.getElementById(iframeId);
            
            if (container.classList.contains('expanded')) return;

            
            document.querySelectorAll('.video-container').forEach(c => {
                if (c.id !== containerId && c.classList.contains('expanded')) {
                    c.classList.remove('expanded');
                    const otherIframe = c.querySelector('iframe');
                    
                    otherIframe.src = otherIframe.src.split('?')[0];
                }
            });

            
            container.classList.add('expanded');
            
            
            setTimeout(() => {
                iframe.src = baseUrl + "?autoplay=1";
            }, 300);
        }
    </script>
