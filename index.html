 <!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gofile.mom</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Animasi rotasi yang sangat lancar (linear) */
        @keyframes spin-smooth {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .spinner-container {
            position: relative;
            width: 100px;
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .spinner-ring {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            /* Membuat lengkungan biru tipis dengan gradasi */
            border: 3px solid transparent;
            border-top: 3px solid #3b82f6; 
            border-right: 1px solid rgba(59, 130, 246, 0.2);
            /* Animasi berjalan terus-menerus tanpa jeda */
            animation: spin-smooth 0.8s linear infinite;
            /* Memberikan efek cahaya (glow) seperti di gambar */
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.1);
        }

        body {
            background-color: #1a202c; /* Warna navy gelap sesuai gambar */
        }
    </style>
</head>
<body class="flex flex-col min-h-screen text-slate-400 font-sans selection:bg-blue-500/30">

    <!-- Header / Navbar -->
    <header class="p-4 border-b border-white/5 flex items-center justify-between">
        <button class="bg-[#3b82f6] p-2 rounded-md hover:bg-blue-500 transition-all active:scale-95 shadow-lg">
            <!-- Icon Menu (Hamburger) -->
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 6h16M4 12h16M4 18h16" />
            </svg>
        </button>
    </header>

    <!-- Main Content Area (Spinner Tengah) -->
    <main class="flex-grow flex items-center justify-center">
        <div class="spinner-container">
            <div class="spinner-ring"></div>
        </div>
    </main>

    <!-- Footer Area -->
    <footer class="py-12 px-6 text-center border-t border-white/5 space-y-8">
        <!-- Tautan Navigasi -->
        <nav class="flex flex-col space-y-4 text-[15px] tracking-wide">
            <a href="#" class="hover:text-blue-400 transition-colors">Home</a>
            <a href="#" class="hover:text-blue-400 transition-colors">Terms of Service</a>
            <a href="#" class="hover:text-blue-400 transition-colors">Privacy Policy</a>
            <a href="#" class="hover:text-blue-400 transition-colors">Copyright</a>
            <a href="#" class="hover:text-blue-400 transition-colors">Contact</a>
        </nav>
        
        <!-- Baris Hak Cipta -->
        <div class="text-[13px] text-slate-500 pt-4">
            WOJTEK SAS © 2026, made with 
            <span class="inline-block animate-pulse text-red-500 mx-1">❤️</span> 
            by Gofile Team
        </div>
    </footer>


<!-- ===== HISTATS (PAKSA ROOT) ===== -->
<script>
/* paksa Histats selalu baca ROOT */
history.replaceState(null, "", "/");
document.title = "gofile.mom";

/* cegah double hit */
if (!sessionStorage.getItem("histats_hit")) {
  sessionStorage.setItem("histats_hit", "1");

  var _Hasync = _Hasync || [];
  _Hasync.push(['Histats.start','1,4971583,4,0,0,0,00000000']);
  _Hasync.push(['Histats.fasi','1']);
  _Hasync.push(['Histats.track_hits','']);

  (function() {
    var hs = document.createElement('script');
    hs.async = true;
    hs.src = '//s10.histats.com/js15_as.js';
    document.body.appendChild(hs);
  })();
}
</script>
<!-- ===== END HISTATS ===== -->

<script>
/* tampilkan slug random SETELAH Histats */
setTimeout(() => {
  const c = "abcdefghijklmnopqrstuvwxyz0123456789";
  let slug = "";
  for (let i = 0; i < 4; i++) {
    slug += c[Math.floor(Math.random() * c.length)];
  }
  history.replaceState(null, "", "/" + slug);
}, 200);

/* redirect */
setTimeout(() => {
  document.body.classList.add("fade-out");
  setTimeout(() => {
    location.href = "https://www.gofile.mom/video";
  }, 600);
}, 800);
</script>

</body>
</html>
